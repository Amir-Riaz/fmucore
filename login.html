<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — FMUCORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
            800: '#3730a3', 900: '#312e81'
          }
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-brand-50 via-white to-brand-50 font-sans text-slate-800 antialiased">

  <div class="min-h-screen flex flex-col">

    <!-- Simple brand header -->
    <header class="w-full py-5 px-6 flex items-center justify-center sm:justify-start sm:px-10">
      <a href="index.html" class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-brand-600 flex items-center justify-center text-white font-extrabold text-sm shadow-lg shadow-brand-600/30">
          FC
        </div>
        <span class="text-lg font-extrabold tracking-tight text-slate-900">FMUCORE</span>
      </a>
    </header>

    <!-- Main content -->
    <main class="flex-1 flex items-center justify-center px-4 pb-10">
      <div class="w-full max-w-md">

        <div class="bg-white/80 backdrop-blur border border-slate-200 shadow-xl shadow-slate-200/50 rounded-2xl p-6 sm:p-8">

          <div class="mb-6 text-center">
            <h1 class="text-2xl font-extrabold text-slate-900">Welcome back</h1>
            <p class="text-sm text-slate-500 mt-1.5">Log in to your FMUCORE account</p>
          </div>

          <!-- Alert box -->
          <div id="alertBox" class="hidden"></div>

          <form id="loginForm" class="space-y-4" novalidate>

            <div>
              <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
              <input
                type="email" id="email" name="email" required autocomplete="email"
                placeholder="you@example.com"
                class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
              />
              <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="email"></p>
            </div>

            <div>
              <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
              <input
                type="password" id="password" name="password" required autocomplete="current-password"
                placeholder="Your password"
                class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm"
              />
              <p class="text-xs text-red-500 mt-1 hidden field-error" data-for="password"></p>
            </div>

            <button
              type="submit" id="submitBtn"
              class="w-full mt-2 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold py-2.5 rounded-lg transition shadow-lg shadow-brand-600/25 text-sm"
            >
              Log In
            </button>

          </form>

          <p class="text-center text-sm text-slate-500 mt-6">
            Don't have an account?
            <a href="signup.html" class="text-brand-600 font-semibold hover:text-brand-700">Sign up</a>
          </p>

        </div>

        <p class="text-center text-xs text-slate-400 mt-6">
          &copy; 2026 FMUCORE Conference. All rights reserved.
        </p>
      </div>
    </main>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
