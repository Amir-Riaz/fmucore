<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Abstracts — FMUCORE Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
            800: '#3730a3', 900: '#312e81'
          }
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <div id="topbar"></div>

  <div id="loadingState" class="max-w-7xl mx-auto px-4 sm:px-6 py-10 animate-pulse">
    <div class="h-8 w-64 bg-slate-200 rounded mb-8"></div>
    <div class="h-96 bg-slate-200 rounded-2xl"></div>
  </div>

  <main id="content" class="hidden max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-6">
      <div>
        <div class="flex items-center gap-3 mb-1">
          <h1 class="text-2xl font-extrabold text-slate-900">Abstract Submissions</h1>
          <a href="admin.html" class="text-xs font-bold text-brand-600 hover:underline">← Participant Management</a>
        </div>
        <p class="text-slate-500 text-sm"><span id="totalCount">0</span> submitted abstracts</p>
      </div>

      <div class="flex flex-col sm:flex-row gap-2">
        <input
          id="searchInput" type="text" placeholder="Search by title or review key..."
          class="px-3.5 py-2 rounded-lg border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none transition text-sm w-full sm:w-72"
        />
        <select id="statusFilter" class="px-3.5 py-2 rounded-lg border border-slate-300 focus:border-brand-500 outline-none transition text-sm bg-white">
          <option value="all">All statuses</option>
          <option value="submitted">Submitted</option>
          <option value="under_review">Under Review</option>
          <option value="accepted">Accepted</option>
          <option value="rejected">Not Accepted</option>
        </select>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 border-b border-slate-200">
            <tr class="text-left text-slate-500 text-xs uppercase tracking-wider">
              <th class="px-4 py-3 font-semibold">Review Key</th>
              <th class="px-4 py-3 font-semibold">Title</th>
              <th class="px-4 py-3 font-semibold hidden md:table-cell">Submitter</th>
              <th class="px-4 py-3 font-semibold hidden lg:table-cell">Speciality</th>
              <th class="px-4 py-3 font-semibold">Status</th>
              <th class="px-4 py-3 font-semibold">Track</th>
              <th class="px-4 py-3 font-semibold text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="abstractsTableBody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
      <div id="emptyState" class="hidden py-16 text-center text-slate-400 text-sm">No abstracts match your search.</div>
    </div>

  </main>

  <!-- Change status modal -->
  <div data-status-modal class="hidden fixed inset-0 z-50 bg-slate-900/50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div class="bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-6 sm:p-8">
      <h3 class="text-lg font-bold text-slate-900 mb-4">Change status</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Status</label>
          <select data-status-select class="w-full rounded-xl border border-slate-300 px-3.5 py-2.5 text-sm bg-white">
            <option value="submitted">Submitted</option>
            <option value="under_review">Under Review</option>
            <option value="accepted">Accepted</option>
            <option value="rejected">Not Accepted</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Presentation track</label>
          <select data-track-select class="w-full rounded-xl border border-slate-300 px-3.5 py-2.5 text-sm bg-white">
            <option value="">Not yet assigned</option>
            <option value="poster">Poster</option>
            <option value="oral">Oral</option>
            <option value="observer">Observer</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" data-close-status-modal class="px-5 py-2.5 rounded-xl border border-slate-300 text-slate-700 text-sm font-bold hover:bg-slate-50 transition">Cancel</button>
        <button type="button" data-save-status class="px-5 py-2.5 rounded-xl bg-brand-600 text-white text-sm font-bold hover:bg-brand-700 transition">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-5 right-5 z-50 max-w-xs px-4 py-3 rounded-lg shadow-lg text-sm font-medium"></div>

  <script type="module" src="js/abstracts-admin.js"></script>
</body>
</html>
