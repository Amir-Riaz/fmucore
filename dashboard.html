<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — FMUCORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: {
          brand: {
            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
            800: '#3730a3', 900: '#312e81'
          }
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">

  <!-- Top bar gets injected here -->
  <div id="topbar"></div>

  <!-- Skeleton shown until auth check resolves -->
  <div id="loadingState" class="max-w-6xl mx-auto px-4 sm:px-6 py-10 animate-pulse">
    <div class="h-8 w-64 bg-slate-200 rounded mb-3"></div>
    <div class="h-4 w-96 max-w-full bg-slate-200 rounded mb-8"></div>
    <div class="h-40 bg-slate-200 rounded-2xl"></div>
  </div>

  <main id="content" class="hidden max-w-6xl mx-auto px-4 sm:px-6 py-10">

    <!-- Welcome card -->
    <div class="bg-gradient-to-br from-brand-600 to-brand-700 rounded-2xl p-6 sm:p-8 text-white shadow-xl shadow-brand-600/20 mb-8">
      <p id="welcomeMsg" class="text-brand-100 text-sm font-medium mb-1.5">Welcome back,</p>
      <h1 id="userNameHeading" class="text-2xl sm:text-3xl font-extrabold mb-1">—</h1>
      <p id="userSerial" class="hidden text-brand-100 text-sm font-mono mb-3"></p>
      <div class="flex flex-wrap gap-x-6 gap-y-2 text-sm text-brand-50 mb-4">
        <div class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zM12 14v7m0-11V3m8 8h.01M4 11h.01" />
          </svg>
          <span id="userEmail">—</span>
        </div>
        <div class="flex items-center gap-2">
          <span id="statusBadge" class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-white/15">—</span>
        </div>
      </div>

      <!-- Prominent Cpack status -->
      <div id="cpackStatusRow" class="hidden">
        <span id="cpackStatusBadge" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-extrabold"></span>
      </div>
    </div>

    <!-- Quick info grid -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <a href="myqr.html" class="bg-white rounded-2xl border border-slate-200 p-5 hover:shadow-lg hover:border-brand-200 transition group">
        <div class="w-10 h-10 rounded-xl bg-brand-50 text-brand-600 flex items-center justify-center mb-3 group-hover:bg-brand-100 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4h4v4H4V4zm0 8h4v4H4v-4zm8-8h4v4h-4V4zm0 8h4v4h-4v-4zm4 4h.01M12 12h.01M16 16h4v4h-4v-4z" />
          </svg>
        </div>
        <h3 class="font-bold text-slate-900 mb-1">My QR Pass</h3>
        <p class="text-sm text-slate-500">View and present your entry QR code.</p>
      </a>

      <a href="speakers.html" class="bg-white rounded-2xl border border-slate-200 p-5 hover:shadow-lg hover:border-brand-200 transition group">
        <div class="w-10 h-10 rounded-xl bg-brand-50 text-brand-600 flex items-center justify-center mb-3 group-hover:bg-brand-100 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4a4 4 0 100 8 4 4 0 000-8zM6 20v-1a4 4 0 014-4h4a4 4 0 014 4v1" />
          </svg>
        </div>
        <h3 class="font-bold text-slate-900 mb-1">Speakers</h3>
        <p class="text-sm text-slate-500">See who's presenting at the conference.</p>
      </a>

      <a href="about.html" class="bg-white rounded-2xl border border-slate-200 p-5 hover:shadow-lg hover:border-brand-200 transition group">
        <div class="w-10 h-10 rounded-xl bg-brand-50 text-brand-600 flex items-center justify-center mb-3 group-hover:bg-brand-100 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <h3 class="font-bold text-slate-900 mb-1">About Us</h3>
        <p class="text-sm text-slate-500">Learn more about the conference.</p>
      </a>
    </div>

  </main>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
